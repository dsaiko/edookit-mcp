version: 2

project_name: edookit-mcp

before:
  hooks:
    - go mod tidy

builds:
  - id: edookit-mcp
    main: .
    binary: edookit-mcp
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      # Windows on ARM64 is rare and we can revisit if anyone asks.
      - goos: windows
        goarch: arm64

archives:
  - id: default
    formats:
      - tar.gz
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
    files:
      - README.md
      - LICENSE
      - .env.example
    format_overrides:
      - goos: windows
        formats:
          - zip

checksum:
  name_template: 'checksums.txt'

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^ci:'
      - '^chore:'
      - 'Merge pull request'
      - 'Merge branch'

release:
  github:
    owner: dsaiko
    name: edookit-mcp
  draft: false
  prerelease: auto
  name_template: "v{{.Version}}"
  header: |
    ## edookit-mcp {{.Tag}}

    Pre-built binaries for macOS (Intel + Apple Silicon), Linux (x86_64 + ARM64), and Windows (x86_64).

    See the [README](https://github.com/dsaiko/edookit-mcp#-pro-uživatele) for installation and configuration.
  footer: |
    **Full Changelog**: https://github.com/dsaiko/edookit-mcp/compare/{{ .PreviousTag }}...{{ .Tag }}

# Homebrew formula auto-publish into dsaiko/homebrew-tap.
# Requires repo secret HOMEBREW_TAP_GITHUB_TOKEN — a PAT with write access to
# the tap repo. If the secret is not set, the workflow passes --skip=brew and
# this section is silently ignored.
brews:
  - name: edookit-mcp
    repository:
      owner: dsaiko
      name: homebrew-tap
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: Formula
    homepage: https://github.com/dsaiko/edookit-mcp
    description: "Unofficial MCP connector for Edookit (Czech school information system)"
    license: MIT
    commit_author:
      name: goreleaser-bot
      email: bot@goreleaser.com
    commit_msg_template: "edookit-mcp {{ .Tag }}"
    caveats: |
      edookit-mcp requires Google Chrome (or any Chromium-family browser) installed
      on the host — it drives a real browser instance once per ~10 hours to log into
      Plus4U OIDC and capture the session cookie.

      Configuration is via environment variables (EDOOKIT_URL, EDOOKIT_USER, EDOOKIT_PASS).
      See https://github.com/dsaiko/edookit-mcp#-pro-uživatele for full setup.
    install: |
      bin.install "edookit-mcp"
    test: |
      # Verify the binary at least starts and reports the expected error when
      # required env vars are missing. Exit code 1 means it ran far enough to
      # validate config — what we want.
      output = shell_output("#{bin}/edookit-mcp 2>&1", 1)
      assert_match "required env var", output
